<style>
  /**
 * ============================================
 * 公共样式
 * 作用：重置样式、星空背景、通用组件样式
 * 适用于：所有页面
 * ============================================
 */

/* ----- 重置所有元素边距和盒模型 ----- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ----- 页面主体 ----- */
body {
  background: #020817;              /* 深空蓝背景色 */
  color: #fff;
  font-family: "Microsoft Yahei", -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ----- 星空粒子容器（固定定位，全屏覆盖）----- */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;                       /* 置于最底层，内容在上面 */
}

/* ----- 通用内容容器（归档页、标签页等使用）----- */
.container {
  position: relative;
  z-index: 10;                      /* 在粒子层之上 */
  max-width: 800px;
  margin: 0 auto;
  padding: 80px 20px;
}

/* ----- 页面头部 ----- */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  color: #00eeff;
  font-size: 42px;
  text-shadow: 0 0 20px #00eeff;    /* 青色发光效果 */
}

/* ----- 通用返回首页按钮 ----- */
.back-home {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 25px;
  background: rgba(0, 32, 65, 0.8);
  border: 1px solid #00eeff;
  border-radius: 30px;
  color: #00eeff;
  text-decoration: none;
  transition: all 0.3s ease;
}
.back-home:hover {
  background: #00eeff;
  color: #020817;
}

/* ----- 文章/页面列表容器（归档页使用）----- */
.post-list {
  background: rgba(0, 22, 45, 0.85);
  border-radius: 18px;
  padding: 30px;
  border: 1px solid #00eeff;
}

/* ----- 列表项 ----- */
.post-item {
  margin: 20px 0;
  padding: 15px;
  border-bottom: 1px solid #00eeff33;
}
.post-item a {
  color: #00eeff;
  text-decoration: none;
  font-size: 20px;
  transition: all 0.3s ease;
}
.post-item a:hover {
  text-shadow: 0 0 8px #00eeff;
}

/* ============================================
   移动端图片和视频自适应
   ============================================ */

/* 所有图片自适应 */
.article-content img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  border-radius: 8px;
}

/* 所有视频和 iframe 自适应 */
.article-content video,
.article-content iframe {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  border-radius: 8px;
}

/* 视频容器 - 保持 16:9 比例 */
.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;  /* 16:9 */
  height: 0;
  overflow: hidden;
  border-radius: 8px;
  margin: 10px 0;
}

.video-container video,
.video-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* B站 iframe 自适应 */
.article-content iframe[src*="bilibili"] {
  width: 100%;
  height: 400px;
  max-height: 50vh;
  border-radius: 8px;
}

/* 移动端适配 */
@media (max-width: 768px) {
  .article-content iframe[src*="bilibili"] {
    height: 250px;
  }
  
  .article-content video,
  .article-content iframe {
    border-radius: 6px;
  }
}
