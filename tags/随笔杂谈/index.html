  ============================================
  单个标签页面模板
  文件：tag.njk
  作用：显示某个标签下的所有文章
  样式依赖：_css/common.css、_css/tag.css
  组件依赖：_components/Particles.njk
  ============================================
-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>随笔杂谈 - 时空秘境</title>
<style>
  /**
 * ============================================
 * 公共样式
 * 作用：重置样式、星空背景、通用组件样式
 * 适用于：所有页面
 * ============================================
 */

/* ----- 重置所有元素边距和盒模型 ----- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ----- 页面主体 ----- */
body {
  background: #020817;              /* 深空蓝背景色 */
  color: #fff;
  font-family: "Microsoft Yahei", -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ----- 星空粒子容器（固定定位，全屏覆盖）----- */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;                       /* 置于最底层，内容在上面 */
}

/* ----- 通用内容容器（归档页、标签页等使用）----- */
.container {
  position: relative;
  z-index: 10;                      /* 在粒子层之上 */
  max-width: 800px;
  margin: 0 auto;
  padding: 80px 20px;
}

/* ----- 页面头部 ----- */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  color: #00eeff;
  font-size: 42px;
  text-shadow: 0 0 20px #00eeff;    /* 青色发光效果 */
}

/* ----- 通用返回首页按钮 ----- */
.back-home {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 25px;
  background: rgba(0, 32, 65, 0.8);
  border: 1px solid #00eeff;
  border-radius: 30px;
  color: #00eeff;
  text-decoration: none;
  transition: all 0.3s ease;
}
.back-home:hover {
  background: #00eeff;
  color: #020817;
}

/* ----- 文章/页面列表容器（归档页使用）----- */
.post-list {
  background: rgba(0, 22, 45, 0.85);
  border-radius: 18px;
  padding: 30px;
  border: 1px solid #00eeff;
}

/* ----- 列表项 ----- */
.post-item {
  margin: 20px 0;
  padding: 15px;
  border-bottom: 1px solid #00eeff33;
}
.post-item a {
  color: #00eeff;
  text-decoration: none;
  font-size: 20px;
  transition: all 0.3s ease;
}
.post-item a:hover {
  text-shadow: 0 0 8px #00eeff;
}

/* ============================================
   移动端图片和视频自适应
   ============================================ */

/* 所有图片自适应 */
.article-content img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  border-radius: 8px;
}

/* 所有视频和 iframe 自适应 */
.article-content video,
.article-content iframe {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  border-radius: 8px;
}

/* 视频容器 - 保持 16:9 比例 */
.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;  /* 16:9 */
  height: 0;
  overflow: hidden;
  border-radius: 8px;
  margin: 10px 0;
}

.video-container video,
.video-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* B站 iframe 自适应 */
.article-content iframe[src*="bilibili"] {
  width: 100%;
  height: 400px;
  max-height: 50vh;
  border-radius: 8px;
}

/* 移动端适配 */
@media (max-width: 768px) {
  .article-content iframe[src*="bilibili"] {
    height: 250px;
  }
  
  .article-content video,
  .article-content iframe {
    border-radius: 6px;
  }
}

/* ===== 手机端代码块和表格滚动 ===== */
@media (max-width: 768px) {
  /* 代码块水平滚动 */
  .article-content pre {
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 13px;
    padding: 12px;
  }
  
  .article-content code {
    font-size: 13px;
    word-break: break-all;
  }
  
  /* 表格水平滚动 */
  .article-content table {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
    font-size: 13px;
  }
  
  .article-content table th,
  .article-content table td {
    padding: 6px 10px;
    font-size: 12px;
  }
  
  /* 图片自适应 */
  .article-content img {
    max-width: 100%;
    height: auto;
  }
}

/* ===== 移动端代码块水平滚动 ===== */
@media (max-width: 768px) {
  .article-content pre,
  .article-content .highlight {
    overflow-x: auto !important;
    white-space: pre !important;
    word-break: normal !important;
    padding: 12px !important;
    font-size: 13px !important;
    -webkit-overflow-scrolling: touch;
  }
  
  .article-content code {
    font-size: 13px !important;
    word-break: normal !important;
  }
  
  .article-content table {
    display: block !important;
    overflow-x: auto !important;
    white-space: nowrap !important;
    -webkit-overflow-scrolling: touch;
  }
}

/* ===== 移动端代码块水平滚动 ===== */
@media (max-width: 768px) {
  .article-content pre,
  .article-content .highlight {
    overflow-x: auto !important;
    white-space: pre !important;
    word-break: normal !important;
    padding: 12px !important;
    font-size: 13px !important;
    -webkit-overflow-scrolling: touch;
  }
  
  .article-content code {
    font-size: 13px !important;
    word-break: normal !important;
  }
  
  .article-content table {
    display: block !important;
    overflow-x: auto !important;
    white-space: nowrap !important;
    -webkit-overflow-scrolling: touch;
  }
}

  <!--
  ============================================
  星空粒子组件（升级版 - 带鼠标互动）
  文件：_components/Particles.njk
  作用：全站统一的星空动画背景，鼠标悬停时粒子产生互动
  ============================================
-->
<div id="particles"></div>
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
particlesJS("particles", {
  particles: {
    number: {
      value: 120,
      density: {
        enable: true,
        value_area: 800
      }
    },
    color: {
      value: "#00eeff"
    },
    shape: {
      type: "circle",
      stroke: {
        width: 0,
        color: "#000000"
      }
    },
    opacity: {
      value: 0.6,
      random: true,
      anim: {
        enable: true,
        speed: 0.5,
        opacity_min: 0.1,
        sync: false
      }
    },
    size: {
      value: 3,
      random: true,
      anim: {
        enable: true,
        speed: 2,
        size_min: 0.1,
        sync: false
      }
    },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#00eeff",
      opacity: 0.4,
      width: 1
    },
    move: {
      enable: true,
      speed: 0.8,
      direction: "none",
      random: true,
      straight: false,
      out_mode: "out",
      bounce: false,
      attract: {
        enable: true,
        rotateX: 600,
        rotateY: 1200
      }
    }
  },
  interactivity: {
    detect_on: "canvas",
    events: {
      onhover: {
        enable: true,
        mode: "grab"       // 鼠标悬停时粒子聚集
      },
      onclick: {
        enable: true,
        mode: "push"       // 点击时产生新粒子
      },
      resize: true
    },
    modes: {
      grab: {
        distance: 200,
        line_linked: {
          opacity: 1
        }
      },
      push: {
        particles_nb: 6
      }
    }
  },
  retina_detect: true
});
</script>
