      /**
 * ============================================
 * 公共样式
 * 作用：重置样式、星空背景、通用组件样式
 * 适用于：所有页面
 * ============================================
 */

/* ----- 重置所有元素边距和盒模型 ----- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ----- 页面主体 ----- */
body {
  background: #020817;              /* 深空蓝背景色 */
  color: #fff;
  font-family: "Microsoft Yahei", -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ----- 星空粒子容器（固定定位，全屏覆盖）----- */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;                       /* 置于最底层，内容在上面 */
}

/* ----- 通用内容容器（归档页、标签页等使用）----- */
.container {
  position: relative;
  z-index: 10;                      /* 在粒子层之上 */
  max-width: 800px;
  margin: 0 auto;
  padding: 80px 20px;
}

/* ----- 页面头部 ----- */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  color: #00eeff;
  font-size: 42px;
  text-shadow: 0 0 20px #00eeff;    /* 青色发光效果 */
}

/* ----- 通用返回首页按钮 ----- */
.back-home {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 25px;
  background: rgba(0, 32, 65, 0.8);
  border: 1px solid #00eeff;
  border-radius: 30px;
  color: #00eeff;
  text-decoration: none;
  transition: all 0.3s ease;
}
.back-home:hover {
  background: #00eeff;
  color: #020817;
}

/* ----- 文章/页面列表容器（归档页使用）----- */
.post-list {
  background: rgba(0, 22, 45, 0.85);
  border-radius: 18px;
  padding: 30px;
  border: 1px solid #00eeff;
}

/* ----- 列表项 ----- */
.post-item {
  margin: 20px 0;
  padding: 15px;
  border-bottom: 1px solid #00eeff33;
}
.post-item a {
  color: #00eeff;
  text-decoration: none;
  font-size: 20px;
  transition: all 0.3s ease;
}
.post-item a:hover {
  text-shadow: 0 0 8px #00eeff;
}

/* ============================================
   移动端图片和视频自适应
   ============================================ */

/* 所有图片自适应 */
.article-content img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  border-radius: 8px;
}

/* 所有视频和 iframe 自适应 */
.article-content video,
.article-content iframe {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 10px auto;
  border-radius: 8px;
}

/* 视频容器 - 保持 16:9 比例 */
.video-container {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;  /* 16:9 */
  height: 0;
  overflow: hidden;
  border-radius: 8px;
  margin: 10px 0;
}

.video-container video,
.video-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* B站 iframe 自适应 */
.article-content iframe[src*="bilibili"] {
  width: 100%;
  height: 400px;
  max-height: 50vh;
  border-radius: 8px;
}

/* 移动端适配 */
@media (max-width: 768px) {
  .article-content iframe[src*="bilibili"] {
    height: 250px;
  }
  
  .article-content video,
  .article-content iframe {
    border-radius: 6px;
  }
}

/* ===== 手机端代码块和表格滚动 ===== */
@media (max-width: 768px) {
  /* 代码块水平滚动 */
  .article-content pre {
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    font-size: 13px;
    padding: 12px;
  }
  
  .article-content code {
    font-size: 13px;
    word-break: break-all;
  }
  
  /* 表格水平滚动 */
  .article-content table {
    display: block;
    overflow-x: auto;
    white-space: nowrap;
    font-size: 13px;
  }
  
  .article-content table th,
  .article-content table td {
    padding: 6px 10px;
    font-size: 12px;
  }
  
  /* 图片自适应 */
  .article-content img {
    max-width: 100%;
    height: auto;
  }
}

      /**
 * ============================================
 * 页面归属：post.njk 文章详情页面模板
 * 功能说明：文章页左右分栏布局、文章卡片、正文标签样式、右下角悬浮按钮、移动端适配
 * 引入位置：post.njk <style> 内部抽取（原layout.css重命名区分语义）
 * 依赖公共：_css/common.css、_css/sidebar.css
 * ============================================
 */
/* ----- 主布局容器：左右两栏，全屏高度 ----- */
.app-layout {
  position: relative;
  z-index: 10;
  display: flex;                     /* 弹性布局，左右并排 */
  height: 100vh;                    /* 全屏高度 */
  overflow: hidden;                 /* 隐藏溢出，子元素自己控制滚动 */
}

/* ----- 右侧内容区：占满剩余空间 ----- */
.main-content {
  flex: 1;                          /* 占满剩余所有空间 */
  overflow-y: auto;                 /* 内容过多时垂直滚动 */
  padding: 40px 60px;
}

/* ----- 文章卡片容器 ----- */
.article-card {
  width: 100%;
  background: rgba(0, 22, 45, 0.6); /* 半透明深蓝色背景 */
  border-radius: 18px;
  padding: 40px;
  border: 1px solid #00eeff;        /* 青色边框 */
}

/* ----- 文章标题 ----- */
.article-title {
  color: #00eeff;
  font-size: 32px;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 1px solid #00eeff33; /* 半透明青色下划线 */
}

/* ----- 文章元数据（发布日期等）----- */
.article-meta {
  color: #88aaff;
  font-size: 14px;
  margin-bottom: 30px;
}

/* ========== 文章正文样式 ========== */
.article-content {
  color: #e0fcff;
  line-height: 1.8;                 /* 行高，提升阅读体验 */
}
.article-content h1 {
  color: #00eeff;
  font-size: 28px;
  margin: 30px 0 15px;
  border-left: 3px solid #00eeff;   /* 左侧青色竖线 */
  padding-left: 12px;
}
.article-content h2 {
  color: #00eeff;
  font-size: 24px;
  margin: 25px 0 12px;
}
.article-content h3 {
  color: #88aaff;
  font-size: 20px;
  margin: 20px 0 10px;
}
.article-content p {
  margin: 0 0 16px;
}
.article-content code {
  background: #001a33;
  padding: 3px 8px;
  border-radius: 6px;
  font-family: monospace;
}
.article-content pre {
  background: #001a33;
  padding: 15px;
  border-radius: 10px;
  overflow-x: auto;                 /* 代码块水平滚动 */
}

/* ========== 右下角悬浮按钮 ========== */
.float-buttons {
  position: fixed;                  /* 固定定位，随页面滚动 */
  bottom: 30px;                     /* 距离底部30px */
  right: 30px;                      /* 距离右侧30px */
  z-index: 100;                     /* 确保在最上层 */
  display: flex;
  flex-direction: column;           /* 垂直排列 */
  gap: 12px;                        /* 按钮间距 */
}

/* ----- 悬浮按钮通用样式 ----- */
.float-btn {
  width: 48px;
  height: 48px;
  border-radius: 50%;               /* 圆形 */
  background: rgba(0, 32, 65, 0.9);
  border: 1px solid #00eeff;
  color: #00eeff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;        /* 平滑过渡动画 */
  text-decoration: none;
}

/* ----- 悬浮按钮 hover 效果 ----- */
.float-btn:hover {
  transform: scale(1.1);            /* 放大10% */
  background: #00eeff;
  color: #020817;
  box-shadow: 0 0 15px #00eeff;     /* 青色发光 */
}

/* ----- 返回顶部按钮：默认隐藏，滚动后显示 ----- */
#back-to-top {
  opacity: 0;
  visibility: hidden;
  transition: all 0.3s ease;
}
#back-to-top.show {
  opacity: 1;
  visibility: visible;
}

/* ========== 移动端适配 ========== */
@media (max-width: 768px) {
  .main-content {
    padding: 20px;
  }
  .float-buttons {
    bottom: 15px;
    right: 15px;
  }
  .float-btn {
    width: 40px;
    height: 40px;
    font-size: 16px;
  }
}
      /**
 * ============================================
 * 侧边栏样式
 * 作用：左侧导航栏的所有样式
 * 适用于：Sidebar.njk 组件
 * ============================================
 */

/* ----- 左侧导航栏容器 ----- */
.sidebar {
  width: 320px;                     /* 固定宽度 */
  background: rgba(0, 22, 45, 0.6);
  backdrop-filter: blur(10px);      /* 毛玻璃效果 */
  border-right: 1px solid #00eeff33;
  overflow-y: auto;                 /* 内容过多时滚动 */
  padding: 20px;
  flex-shrink: 0;                   /* 防止被压缩 */
}

/* ========== 个人资料卡片 ========== */
.profile-card {
  text-align: center;
  padding: 20px;
  background: rgba(0, 22, 45, 0.7);
  border-radius: 16px;
  margin-bottom: 20px;
}

/* ----- 头像 ----- */
.avatar img {
  width: 80px;
  height: 80px;
  border-radius: 50%;              /* 圆形头像 */
  border: 2px solid #00eeff;
}

/* ----- 昵称 ----- */
.nickname {
  color: #00eeff;
  font-size: 18px;
  margin: 10px 0 5px;
}

/* ----- 个人简介 ----- */
.bio {
  color: #88aaff;
  font-size: 12px;
}

/* ----- 统计数据（文章数、粉丝数、关注数）----- */
.stats {
  display: flex;
  justify-content: space-around;
  margin: 15px 0;
}
.stat-item {
  text-align: center;
}
.stat-num {
  display: block;
  color: #00eeff;
  font-size: 20px;
  font-weight: bold;
}
.stat-label {
  color: #88aaff;
  font-size: 12px;
}

/* ----- 关注按钮 ----- */
.follow-btn {
  background: rgba(0, 238, 255, 0.2);
  border: 1px solid #00eeff;
  color: #00eeff;
  padding: 6px 20px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.follow-btn:hover {
  background: #00eeff;
  color: #020817;
}

/* ========== 搜索框 ========== */
.search-box {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.search-box input {
  flex: 1;
  padding: 10px;
  background: rgba(0, 22, 45, 0.7);
  border: 1px solid #00eeff;
  border-radius: 8px;
  color: #fff;
}
.search-box input::placeholder {
  color: #88aaff;
}
.search-box button {
  padding: 10px 15px;
  background: rgba(0, 238, 255, 0.2);
  border: 1px solid #00eeff;
  border-radius: 8px;
  color: #00eeff;
  cursor: pointer;
  transition: all 0.3s ease;
}
.search-box button:hover {
  background: #00eeff;
  color: #020817;
}

/* ========== 卡片通用样式 ========== */
.links-card,
.tags-card,
.archive-card {
  background: rgba(0, 22, 45, 0.7);
  border-radius: 16px;
  padding: 15px;
  margin-bottom: 20px;
}
.links-card h4,
.tags-card h4,
.archive-card h4 {
  color: #00eeff;
  margin-bottom: 10px;
  padding-bottom: 5px;
  border-bottom: 1px solid #00eeff33;
}

/* ----- 链接列表 ----- */
.links-card ul,
.archive-list {
  list-style: none;
  padding: 0;
}
.links-card li,
.archive-list li {
  margin: 8px 0;
}
.links-card a,
.archive-list a {
  color: #ccddff;
  text-decoration: none;
  font-size: 13px;
  transition: all 0.3s ease;
}
.links-card a:hover,
.archive-list a:hover {
  color: #00eeff;
  padding-left: 4px;
}

/* ========== 标签云 ========== */
.tag-cloud {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.tag-link {
  color: #ccddff;
  text-decoration: none;
  font-size: 12px;
  padding: 4px 8px;
  background: rgba(0, 0, 0, 0.3);
  border-radius: 15px;
  transition: all 0.3s ease;
}
.tag-link:hover {
  color: #00eeff;
  background: rgba(0, 238, 255, 0.2);
}

/* ========== 移动端适配：小屏幕隐藏侧边栏 ========== */
@media (max-width: 768px) {
  .sidebar {
    display: none;
  }
}

<script>
  /**
 * ============================================
 * 侧边栏交互脚本
 * 文件：_js/sidebar.js
 * 作用：搜索功能、粉丝数点击 +1、关注数点击 +1
 * ============================================
 */

document.addEventListener('DOMContentLoaded', function() {

  // ===== 搜索功能 =====
  var searchBtn = document.getElementById('search-btn');
  var searchInput = document.getElementById('search-input');
  
  if (searchBtn) {
    searchBtn.addEventListener('click', function() {
      var keyword = searchInput.value.trim();
      if (keyword) {
        window.location.href = '/search/?q=' + encodeURIComponent(keyword);
      }
    });
  }
  
  if (searchInput) {
    searchInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        var keyword = searchInput.value.trim();
        if (keyword) {
          window.location.href = '/search/?q=' + encodeURIComponent(keyword);
        }
      }
    });
  }

  // ===== 粉丝数点击 +1（起始 1088） =====
  var fansEl = document.getElementById('fans-count');
  if (fansEl) {
    fansEl.addEventListener('click', function() {
      var current = parseInt(this.textContent);
      this.textContent = current + 1;
      // 点击反馈动画
      this.style.transform = 'scale(1.3)';
      this.style.color = '#ff6b6b';
      setTimeout(function() {
        fansEl.style.transform = 'scale(1)';
        fansEl.style.color = '#00eeff';
      }, 300);

});
