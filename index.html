      /**
 * ============================================
 * 公共样式
 * 作用：重置样式、星空背景、通用组件样式
 * 适用于：所有页面
 * ============================================
 */

/* ----- 重置所有元素边距和盒模型 ----- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ----- 页面主体 ----- */
body {
  background: #020817;              /* 深空蓝背景色 */
  color: #fff;
  font-family: "Microsoft Yahei", -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ----- 星空粒子容器（固定定位，全屏覆盖）----- */
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;                       /* 置于最底层，内容在上面 */
}

/* ----- 通用内容容器（归档页、标签页等使用）----- */
.container {
  position: relative;
  z-index: 10;                      /* 在粒子层之上 */
  max-width: 800px;
  margin: 0 auto;
  padding: 80px 20px;
}

/* ----- 页面头部 ----- */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  color: #00eeff;
  font-size: 42px;
  text-shadow: 0 0 20px #00eeff;    /* 青色发光效果 */
}

/* ----- 通用返回首页按钮 ----- */
.back-home {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 25px;
  background: rgba(0, 32, 65, 0.8);
  border: 1px solid #00eeff;
  border-radius: 30px;
  color: #00eeff;
  text-decoration: none;
  transition: all 0.3s ease;
}
.back-home:hover {
  background: #00eeff;
  color: #020817;
}

/* ----- 文章/页面列表容器（归档页使用）----- */
.post-list {
  background: rgba(0, 22, 45, 0.85);
  border-radius: 18px;
  padding: 30px;
  border: 1px solid #00eeff;
}

/* ----- 列表项 ----- */
.post-item {
  margin: 20px 0;
  padding: 15px;
  border-bottom: 1px solid #00eeff33;
}
.post-item a {
  color: #00eeff;
  text-decoration: none;
  font-size: 20px;
  transition: all 0.3s ease;
}
.post-item a:hover {
  text-shadow: 0 0 8px #00eeff;
}

      /**
 * ============================================
 * 首页专用样式
 * 文件：_css/home.css
 * 作用：首页的大按钮、打字机对话框、折叠菜单样式
 * ============================================
 */

/* ===== 首页隐藏滚动条 ===== */
body {
  overflow: hidden;
}

/* ===== 粒子背景层级 ===== */
#particles-js {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* ===== 中央内容容器 ===== */
.center-box {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 9999;
  width: 90%;
  max-width: 600px;
  text-align: center;
  pointer-events: auto;
}

/* ===== 对话框/文字卡片 ===== */
.dialog {
  background: rgba(0, 22, 45, 0.95);
  border: 2px solid #00eeff;
  border-radius: 20px;
  padding: 35px 45px;
  margin-bottom: 30px;
  box-shadow: 0 0 40px rgba(0, 238, 255, 0.3);
}

/* ===== 打字机文字 ===== */
.type-text {
  font-size: 20px;
  line-height: 1.8;
  color: #e0fcff;
  letter-spacing: 1px;
  min-height: 60px;
}

/* ============================================
   折叠触发器按钮（统一样式）
   ============================================ */
.collapse-trigger {
  display: block;
  margin: 10px auto;
  padding: 18px 0;
  width: 88%;
  max-width: 440px;
  background: linear-gradient(135deg, rgba(0, 32, 65, 0.95), rgba(0, 60, 120, 0.95));
  color: #fff;
  border: 2px solid #00eeff;
  border-radius: 16px;
  text-decoration: none;
  font-size: 17px;
  transition: all 0.3s ease;
  letter-spacing: 2px;
  pointer-events: auto;
  cursor: pointer;
  position: relative;
}

.collapse-trigger:hover {
  transform: scale(1.03);
  box-shadow: 0 0 30px #00eeff;
  background: linear-gradient(135deg, rgba(0, 40, 80, 0.95), rgba(0, 70, 140, 0.95));
}

/* ===== 折叠箭头图标 ===== */
.collapse-arrow {
  position: absolute;
  left: 30px;
  top: 50%;
  transform: translateY(-50%);
  transition: transform 0.3s ease;
}

.collapse-arrow.rotate {
  transform: translateY(-50%) rotate(90deg);
}

/* ============================================
   子菜单折叠容器（默认隐藏）
   ============================================ */
.submenu {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  margin: 0 auto;
  width: 88%;
  max-width: 440px;
}

.submenu.show {
  max-height: 500px;
}

/* ============================================
   子类按钮样式
   ============================================ */
.sub-btn {
  display: block;
  margin: 8px auto;
  padding: 15px 0;
  width: 90%;
  background: rgba(0, 25, 50, 0.95);
  color: #e0fcff;
  border: 2px solid #00aaff;
  border-radius: 14px;
  text-decoration: none;
  font-size: 16px;
  transition: all 0.3s ease;
  letter-spacing: 1px;
  pointer-events: auto;
  cursor: pointer;
}

.sub-btn:hover {
  transform: scale(1.02);
  box-shadow: 0 0 20px #00aaff;
  background: rgba(0, 35, 70, 0.95);
}

/* ============================================
   独立按钮（无子分类）
   ============================================ */
.normal-btn {
  display: block;
  margin: 10px auto;
  padding: 18px 0;
  width: 88%;
  max-width: 440px;
  background: linear-gradient(135deg, rgba(0, 32, 65, 0.95), rgba(0, 60, 120, 0.95));
  color: #fff;
  border: 2px solid #00eeff;
  border-radius: 16px;
  text-decoration: none;
  font-size: 17px;
  transition: all 0.3s ease;
  letter-spacing: 2px;
  pointer-events: auto;
  cursor: pointer;
}

.normal-btn:hover {
  transform: scale(1.03);
  box-shadow: 0 0 30px #00eeff;
  background: linear-gradient(135deg, rgba(0, 40, 80, 0.95), rgba(0, 70, 140, 0.95));

/* ===== 统一宽度，左右对齐 ===== */
.center-box {

  width: 90%;

.dialog {

  box-sizing: border-box;

    <!-- 首页脚本（打字机 + 折叠功能） -->
    <script>
      /**
 * ============================================
 * 首页打字机动画 + 折叠菜单脚本
 * 文件：_js/typing.js
 * 作用：首页的打字机文字效果 + 分类折叠展开
 * ============================================
 */

// ===== 打字机动画 =====
const story = "时空裂隙已开启，你降临在无垠星海之中.";
let index = 0;

function typeWriter() {
  if (index < story.length) {
    document.getElementById("storyText").innerText += story.charAt(index);
    index++;
    setTimeout(typeWriter, 60);
  }
}

setTimeout(typeWriter, 300);

// ===== 折叠/展开通用函数 =====
function setupCollapse(triggerId, submenuId, arrowId) {
  const trigger = document.getElementById(triggerId);
  const submenu = document.getElementById(submenuId);
  const arrow = document.getElementById(arrowId);
  if (!trigger || !submenu || !arrow) return;

  trigger.addEventListener("click", function (e) {
    // 切换折叠状态
    submenu.classList.toggle("show");
    arrow.classList.toggle("rotate");
    e.preventDefault();
  });

  // 双击跳转到分类总页
  trigger.addEventListener("dblclick", function () {
    window.location.href = "/about/";
  });

  // 点击除箭头外的区域，如果子菜单已展开则跳转
  trigger.addEventListener("click", function (e) {
    if (e.target !== arrow && submenu.classList.contains("show")) {
      window.location.href = "/about/";
    }
  });
}

// 初始化两个折叠组件
setupCollapse("techTrigger", "techSubmenu", "techArrow");
setupCollapse("funTrigger", "funSubmenu", "funArrow");

    </script>
